<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instalasi Penelitian dan Pengkajian Teknologi Pertanian Batang</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2d6a4f',
                        secondary: '#40916c',
                        accent: '#d4a373',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="bg-white shadow-md p-4">
    <h1 class="text-xl font-bold text-primary">
        IP2TP Batang
    </h1>
</nav>

<!-- HERO -->
<section class="bg-green-700 text-white py-16 text-center">
    <h1 class="text-4xl font-bold mb-4">
        Instalasi Penelitian dan Pengkajian Teknologi Pertanian Batang
    </h1>
    <p class="text-xl mb-4">
        Pusat Inovasi & Teknologi Pertanian Digital Kabupaten Batang
    </p>
</section>

<!-- DASHBOARD -->
<section class="p-8">
    <h2 class="text-2xl font-bold mb-6 text-center">
        Dashboard Pertanian
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div class="bg-white p-4 shadow rounded">
            <h3>Produksi Padi</h3>
            <p class="text-xl font-bold text-primary">1.250 ton</p>
        </div>

        <div class="bg-white p-4 shadow rounded">
            <h3>Luas Panen</h3>
            <p class="text-xl font-bold text-primary">520 Ha</p>
        </div>

        <div class="bg-white p-4 shadow rounded">
            <h3>Harga Gabah</h3>
            <p class="text-xl font-bold text-primary">Rp 6.200/kg</p>
        </div>

        <div class="bg-white p-4 shadow rounded">
            <h3>Curah Hujan</h3>
            <p class="text-xl font-bold text-primary">120 mm</p>
        </div>
    </div>
</section>

<!-- GRAFIK -->
<section class="p-8">
    <div class="bg-white p-6 rounded shadow">
        <canvas id="chart"></canvas>
    </div>
</section>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'],
        datasets: [{
            label: 'Produksi Padi',
            data: [800, 900, 1000, 1100, 1200, 1250],
            borderWidth: 2
        }]
    }
});
</script>

</body>
</html>
